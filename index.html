<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter','system-ui','sans-serif'],

<style>
  html,body{font-family:'Inter',system-ui,sans-serif;}
  .num{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
  .scroll-thin::-webkit-scrollbar{width:8px;height:8px}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
  .dark .scroll-thin::-webkit-scrollbar-thumb{background:#334155}
  .fade-in{animation:fade .25s ease-out}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .pop-in{animation:pop .2s ease-out}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .hover-lift{transition:transform .15s ease, box-shadow .15s ease}
  .hover-lift:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(15,23,42,.08)}
  .nav-active{background:linear-gradient(90deg, rgba(99,102,241,.12), rgba(124,58,237,.06)); color:#4f46e5}
  .dark .nav-active{background:linear-gradient(90deg, rgba(99,102,241,.18), rgba(124,58,237,.10)); color:#a5b4fc}
  .kbd{font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid #e2e8f0;background:#f8fafc;padding:1px 6px;border-radius:6px;color:#475569}
  .dark .kbd{background:#0f172a;border-color:#334155;color:#cbd5e1}
  .row-hover:hover{background:#f8fafc}
  .dark .row-hover:hover{background:#0f172a}
  .skel{background:linear-gradient(90deg,#f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);background-size:200% 100%;animation:shimmer 1.4s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .dot::before{content:'';display:inline-block;width:6px;height:6px;border-radius:99px;margin-right:6px;background:currentColor;vertical-align:middle}
  @media print{
    body *{visibility:hidden}
    #print-area, #print-area *{visibility:visible}
    #print-area{position:absolute;inset:0;padding:24px;background:white;color:black}
    .no-print{display:none !important}
  }
  /* Toast */
  .toast{animation:toastIn .25s ease-out}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* Glass */
  .glass{backdrop-filter:saturate(140%) blur(8px); background:rgba(255,255,255,.7)}
  .dark .glass{background:rgba(10,10,11,.6)}
</style>
</head>
<body class="bg-stone-50 dark:bg-[#0a0a0b] text-stone-900 dark:text-stone-100 antialiased">

<!-- ============= APP SHELL ============= -->
<div id="app" class="min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="hidden md:flex w-64 shrink-0 flex-col border-r border-stone-200 dark:border-stone-800 bg-white dark:bg-[#0f0f10] sticky top-0 h-screen">

    </div>
    <div class="px-3 mt-2 mb-2">
      <button onclick="openCmdK()" class="w-full text-left flex items-center gap-2 text-sm px-3 py-2 rounded-lg border border-stone-200 dark:border-stone-800 text-stone-500 dark:text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-900">
        <i data-lucide="search" class="w-4 h-4"></i> Search…
        <span class="ml-auto kbd">⌘K</span>

    </div>
    <nav id="nav" class="px-2 py-2 flex-1 overflow-y-auto scroll-thin space-y-0.5 text-sm"></nav>
    <div class="border-t border-stone-200 dark:border-stone-800 p-3">

      <div class="px-3 pt-2 pb-1 flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 text-white flex items-center justify-center text-xs font-semibold">A</div>
        <div class="text-xs">
          <div class="font-medium">Appu</div>
          <div class="text-stone-500">Owner · Main Branch</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-w-0 flex flex-col">
    <!-- Topbar -->
    <header class="sticky top-0 z-20 glass border-b border-stone-200 dark:border-stone-800">
      <div class="px-4 md:px-6 h-14 flex items-center gap-3">
        <button class="md:hidden p-2 rounded-lg hover:bg-stone-100 dark:hover:bg-stone-900" onclick="toggleSidebar()"><i data-lucide="menu" class="w-5 h-5"></i></button>

        <div class="flex items-center gap-2">
          <button onclick="openCmdK()" class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg border border-stone-200 dark:border-stone-800 text-xs text-stone-500 hover:bg-stone-50 dark:hover:bg-stone-900">

        <span class="kbd">esc</span>

    </div>

<script>
/* =====================================================================
   BizOS — single-file SPA
   ===================================================================== */

/* ---------- Storage & Seed ---------- */
const KEY='bizos.v1';
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=(p='')=> p+Math.random().toString(36).slice(2,9);
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||null}catch(e){return null} }
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function seed(){
  const today=new Date();
  const daysAgo=n=>{const d=new Date(today);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)};
  const products=[
    {id:uid('p_'),sku:'SKU-1001',name:'Premium A4 Paper Ream',category:'Stationery',cost:280,price:340,stock:120,reorder:30,tax:18,unit:'Ream',hsn:'4802',img:'📄'},
    {id:uid('p_'),sku:'SKU-1002',name:'Ballpoint Pen (Blue, 10-pack)',category:'Stationery',cost:85,price:120,stock:240,reorder:50,tax:12,unit:'Pack',hsn:'9608',img:'🖊️'},
    {id:uid('p_'),sku:'SKU-1003',name:'Wireless Mouse',category:'Electronics',cost:540,price:799,stock:45,reorder:15,tax:18,unit:'Pcs',hsn:'8471',img:'🖱️'},
    {id:uid('p_'),sku:'SKU-1004',name:'USB-C Cable 1m',category:'Electronics',cost:140,price:249,stock:8,reorder:25,tax:18,unit:'Pcs',hsn:'8544',img:'🔌'},
    {id:uid('p_'),sku:'SKU-1005',name:'Notebook A5 (200pg)',category:'Stationery',cost:60,price:99,stock:300,reorder:80,tax:12,unit:'Pcs',hsn:'4820',img:'📓'},
    {id:uid('p_'),sku:'SKU-1006',name:'Stapler Heavy Duty',category:'Stationery',cost:320,price:499,stock:22,reorder:10,tax:18,unit:'Pcs',hsn:'8305',img:'📎'},
    {id:uid('p_'),sku:'SKU-1007',name:'Mechanical Keyboard',category:'Electronics',cost:2200,price:3299,stock:14,reorder:5,tax:18,unit:'Pcs',hsn:'8471',img:'⌨️'},
    {id:uid('p_'),sku:'SKU-1008',name:'Sticky Notes (Pack of 5)',category:'Stationery',cost:90,price:149,stock:180,reorder:40,tax:12,unit:'Pack',hsn:'4820',img:'🗒️'},
    {id:uid('p_'),sku:'SKU-1009',name:'Office Chair Mesh',category:'Furniture',cost:4200,price:6499,stock:5,reorder:3,tax:18,unit:'Pcs',hsn:'9401',img:'🪑'},
    {id:uid('p_'),sku:'SKU-1010',name:'Desk Lamp LED',category:'Electronics',cost:680,price:999,stock:18,reorder:8,tax:18,unit:'Pcs',hsn:'9405',img:'💡'},
    {id:uid('p_'),sku:'SKU-1011',name:'Whiteboard Marker (Set 4)',category:'Stationery',cost:120,price:199,stock:90,reorder:30,tax:12,unit:'Set',hsn:'9608',img:'🖍️'},
    {id:uid('p_'),sku:'SKU-1012',name:'Power Bank 20000mAh',category:'Electronics',cost:1100,price:1699,stock:25,reorder:10,tax:18,unit:'Pcs',hsn:'8507',img:'🔋'}
  ];
  const customers=[
    {id:uid('c_'),name:'Ramesh Traders',type:'Online',phone:'+91 98200 11111',email:'ramesh@traders.in',gstin:'27AABCR1234M1Z2',address:'Mumbai, MH',balance:0,credit:50000,since:daysAgo(420)},
    {id:uid('c_'),name:'Aditi Kumar',type:'Walk-in',phone:'+91 99877 22222',email:'aditi@gmail.com',gstin:'',address:'Pune, MH',balance:0,credit:10000,since:daysAgo(180)},
    {id:uid('c_'),name:'Bright Schools Co.',type:'Online',phone:'+91 91022 33333',email:'po@bright.edu',gstin:'29AAACB7890N1Z3',address:'Bengaluru, KA',balance:0,credit:200000,since:daysAgo(95)},
    {id:uid('c_'),name:'Walk-in Customer',type:'Walk-in',phone:'',email:'',gstin:'',address:'',balance:0,credit:0,since:daysAgo(1)},
    {id:uid('c_'),name:'Sharma Stationery',type:'Walk-in',phone:'+91 90011 44444',email:'sharma@stationery.in',gstin:'07AAACS5678P1Z4',address:'Delhi, DL',balance:0,credit:80000,since:daysAgo(260)}
  ];
  const suppliers=[
    {id:uid('s_'),name:'Paperline Mills',phone:'+91 90000 11111',email:'sales@paperline.in',gstin:'27AAACP1111M1Z2',address:'Surat, GJ',balance:0,terms:'Net 30',rating:4.6},
    {id:uid('s_'),name:'TechWholesale Pvt Ltd',phone:'+91 90000 22222',email:'orders@techws.in',gstin:'29AAACT2222N1Z3',address:'Bengaluru, KA',balance:0,terms:'Net 45',rating:4.2},
    {id:uid('s_'),name:'OfficeMate Distributors',phone:'+91 90000 33333',email:'hello@officemate.in',gstin:'07AAACO3333O1Z4',address:'Gurgaon, HR',balance:0,terms:'Net 15',rating:4.8}
  ];
  // Random sales over last 30 days
  const invoices=[]; let invNum=1001;
  for(let d=29;d>=0;d--){
    const date=daysAgo(d);
    const count=2+Math.floor(Math.random()*4);
    for(let i=0;i<count;i++){
      const cust=customers[Math.floor(Math.random()*customers.length)];
      const lineCount=1+Math.floor(Math.random()*4);
      const lines=[];
      for(let j=0;j<lineCount;j++){
        const p=products[Math.floor(Math.random()*products.length)];
        const qty=1+Math.floor(Math.random()*5);
        lines.push({pid:p.id,sku:p.sku,name:p.name,qty,price:p.price,cost:p.cost,tax:p.tax,disc:0});
      }
      const sub=lines.reduce((s,l)=>s+l.qty*l.price,0);
      const tax=lines.reduce((s,l)=>s+l.qty*l.price*l.tax/100,0);
      invoices.push({
        id:uid('inv_'),
        number:'INV-'+(invNum++),
        date,
        dueDate:date,
        customerId:cust.id,
        lines,
        subtotal:sub,
        discount:0,
        tax,
        total:Math.round(sub+tax),
        paid:Math.round(sub+tax),
        status:'paid',
        payment:['Cash','Card','UPI','Bank'][Math.floor(Math.random()*4)],
        notes:''
      });
    }
  }
  // A couple of unpaid
  invoices[invoices.length-1].paid=0; invoices[invoices.length-1].status='unpaid';
  invoices[invoices.length-3].paid=0; invoices[invoices.length-3].status='unpaid';

  const purchases=[
    {id:uid('po_'),number:'BILL-2001',date:daysAgo(20),supplierId:suppliers[0].id,lines:[{pid:products[0].id,sku:products[0].sku,name:products[0].name,qty:50,price:280,tax:18}],subtotal:14000,tax:2520,total:16520,paid:16520,status:'paid'},
    {id:uid('po_'),number:'BILL-2002',date:daysAgo(12),supplierId:suppliers[1].id,lines:[{pid:products[2].id,sku:products[2].sku,name:products[2].name,qty:20,price:540,tax:18},{pid:products[6].id,sku:products[6].sku,name:products[6].name,qty:5,price:2200,tax:18}],subtotal:21800,tax:3924,total:25724,paid:0,status:'unpaid'},
    {id:uid('po_'),number:'BILL-2003',date:daysAgo(5),supplierId:suppliers[2].id,lines:[{pid:products[1].id,sku:products[1].sku,name:products[1].name,qty:100,price:85,tax:12}],subtotal:8500,tax:1020,total:9520,paid:9520,status:'paid'}
  ];
  const expenses=[
    {id:uid('e_'),date:daysAgo(2),category:'Rent',amount:25000,note:'Shop rent — May',method:'Bank'},
    {id:uid('e_'),date:daysAgo(4),category:'Utilities',amount:3400,note:'Electricity bill',method:'UPI'},
    {id:uid('e_'),date:daysAgo(7),category:'Salary',amount:48000,note:'Staff salary — Apr',method:'Bank'},
    {id:uid('e_'),date:daysAgo(15),category:'Internet',amount:1200,note:'Broadband',method:'UPI'},
    {id:uid('e_'),date:daysAgo(22),category:'Misc',amount:850,note:'Tea & snacks',method:'Cash'}
  ];
  return {
    org:{name:'Demo Stationers & Co.',address:'12 Main Street, Pune 411001, India',phone:'+91 98765 43210',email:'hello@demostationers.in',gstin:'27AAACD1234M1Z5',currency:'INR',symbol:'₹',taxLabel:'GST',footer:'Thank you for shopping with us!',brand:'#4f46e5'},
    branch:{id:'b_main',name:'Main Branch'},
    products,customers,suppliers,invoices,purchases,expenses,
    payments:[],
    audit:[],
    auth:{founderPasswordHash:'',needsSetup:true,session:null},
    team:[],
    settings:{darkMode:false,template:'modern'}
  };
}

let state = load() || seed();
// Robust migration so older saved data can't break newer code
function migrate(s){
  const def=seed();
  for(const k of Object.keys(def)) if(s[k]===undefined) s[k]=def[k];
  if(!s.auth) s.auth={founderPasswordHash:'',needsSetup:true,session:null};
  if(s.auth.needsSetup===undefined) s.auth.needsSetup = !s.auth.founderPasswordHash;
  if(!s.team) s.team=[];
  if(!s.org) s.org=def.org;
  if(!s.settings) s.settings={darkMode:false,template:'modern'};
  if(!s.audit) s.audit=[];
  if(!s.payments) s.payments=[];
  // Default any customer without a type
  (s.customers||[]).forEach(c=>{ if(!c.type) c.type = c.name?.toLowerCase().includes('walk') ? 'Walk-in' : 'Walk-in'; });
  return s;
}
// Reusable customer-type badge HTML
function custTypeBadge(type){
  const t=type||'Walk-in';
  if(t==='Online') return '<span class="inline-flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded-md bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300 font-medium"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>Online</span>';
  return '<span class="inline-flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded-md bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300 font-medium"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>Walk-in</span>';
}
state=migrate(state);
if(state.settings?.darkMode) document.documentElement.classList.add('dark');

// Global error surface — make any silent JS error visible
window.addEventListener('error',(e)=>{
  console.error('BizOS error:',e.error||e.message);
  try{ toast('Error: '+(e.message||'see console'),'err'); }catch(_){}
});
window.addEventListener('unhandledrejection',(e)=>{
  console.error('BizOS promise rejection:',e.reason);
  try{ toast('Error: '+(e.reason?.message||e.reason||'see console'),'err'); }catch(_){}
});

/* ---------- Auth ---------- */
function fallbackHash(s){
  // Simple deterministic hash for environments where crypto.subtle is unavailable (e.g. some file:// contexts)
  let h1=0x811c9dc5, h2=0xdeadbeef;
  for(let i=0;i<s.length;i++){const c=s.charCodeAt(i); h1=Math.imul(h1^c,2654435761); h2=Math.imul(h2^c,1597334677);}
  h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);
  return 'fb_'+(h2>>>0).toString(16).padStart(8,'0')+(h1>>>0).toString(16).padStart(8,'0');
}
async function hashPwd(p){
  const salted=p+'::bizos.salt';
  try{
    if(window.crypto && crypto.subtle && crypto.subtle.digest){
      const enc=new TextEncoder().encode(salted);
      const buf=await crypto.subtle.digest('SHA-256',enc);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){ console.warn('crypto.subtle unavailable, using fallback hash',e); }
  return fallbackHash(salted);
}

  document.getElementById('nav').innerHTML = routes.filter(r=>!r.hide && (!r.roles || (r0 && r.roles.includes(r0)))).map(r=>`
    <a href="${r.hash}" class="flex items-center gap-2.5 px-3 py-2 rounded-lg ${cur.startsWith(r.hash)?'nav-active font-medium':'text-stone-700 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-900'}">

  document.getElementById('sidebar').style.display = show ? '' : 'none';
  document.querySelector('header').style.display = show ? '' : 'none';

function router(){
  // Setup gate
  if(state.auth?.needsSetup){
    showAppShell(false);
    document.getElementById('view').innerHTML = viewSetup();
    document.getElementById('view').className='flex-1 fade-in';
    lucide.createIcons();
    return;
  }
  // Auth gate
  if(!isAuthed()){
    showAppShell(false);
    document.getElementById('view').innerHTML = viewLogin();
    document.getElementById('view').className='flex-1 fade-in';
    lucide.createIcons();
    return;
  }
  showAppShell(true);
  document.getElementById('view').className='flex-1 px-4 md:px-6 py-6 fade-in';
  // Default landing per role
  if(!location.hash){ location.hash = isFounder() ? '#/dashboard' : '#/team-pos'; return; }
  const cur=location.hash;
  // 1) Try exact match first (so '#/sales/new' isn't swallowed by '#/sales')
  let r = routes.find(rt => cur === rt.hash);
  // 2) Fall back to prefix match — but require longer than the cur hash's prefix
  if(!r) r = routes.find(rt => rt.hash.length>2 && cur.startsWith(rt.hash+'/'));
  // 3) Role permission check
  if(r && r.roles && !r.roles.includes(role())){
    location.hash = isFounder() ? '#/dashboard' : '#/team-pos';
    return;
  }
  document.getElementById('crumbs').innerHTML = r ? `<i data-lucide="${r.icon}" class="w-4 h-4"></i><span class="text-stone-900 dark:text-stone-100 font-medium">${r.label}</span>` : '';
  renderNav();
  document.getElementById('view').innerHTML = r ? r.render() : '<div>Not found</div>';
  lucide.createIcons();
  if(r && r.after) r.after();
  if(window._afterRender){ window._afterRender(); window._afterRender=null; }
  window.scrollTo({top:0,behavior:'instant'});
  renderTopbarUser();
  renderFooterActions();
}

function drawTrendChart(){
  const data=last7Days();
  const ctx=document.getElementById('trend');
  if(!ctx) return;
  const grad=ctx.getContext('2d').createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(99,102,241,.3)'); grad.addColorStop(1,'rgba(99,102,241,0)');
  new Chart(ctx,{type:'line',data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.value),borderColor:'#6366f1',backgroundColor:grad,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#6366f1',borderWidth:2}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(120,113,108,.1)'},ticks:{callback:v=>SYM()+(v/1000).toFixed(0)+'k'}}},maintainAspectRatio:false}});
}
function drawCatChart(){
  const ctx=document.getElementById('cat'); if(!ctx) return;
  const map={};
  state.invoices.forEach(i=>i.lines.forEach(l=>{const p=findProd(l.pid); if(!p) return; map[p.category]=(map[p.category]||0)+l.qty*l.price;}));
  const labels=Object.keys(map), data=Object.values(map);
  new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:['#6366f1','#8b5cf6','#14b8a6','#f59e0b','#ef4444','#0ea5e9'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:8,boxHeight:8,font:{size:11}}},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.parsed)}}},cutout:'65%',maintainAspectRatio:false}});
}

function filterSales(){
  const q=(document.getElementById('salesSearch').value||'').toLowerCase();
  const st=document.getElementById('salesStatus').value;
  const list=state.invoices.filter(i=>{
    if(st && i.status!==st) return false;

    const c=findCust(i.customerId);
    return i.number.toLowerCase().includes(q) || (c?.name||'').toLowerCase().includes(q);
  }).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('salesBody').innerHTML=renderSalesRows(list);
  lucide.createIcons();
}

function deleteSale(id){
  if(!isFounder()) return toast('Only founders can delete sales','err');
  var inv=state.invoices.find(function(x){return x.id===id;}); if(!inv) return;
  if(!confirm('Delete '+inv.number+'? This cannot be undone.')) return;
  inv.lines.forEach(function(l){var p=findProd(l.pid);if(p)p.stock+=l.qty;});
  state.invoices=state.invoices.filter(function(x){return x.id!==id;});
  state.audit.push({ts:Date.now(),action:'invoice.delete',ref:inv.number,by:currentUser()||'Founder'});
  save(); closeModal(); toast(inv.number+' deleted');
  go('#/sales');
}
function editSale(id){
  if(!isFounder()) return toast('Only founders can edit sales','err');
  var inv=state.invoices.find(function(x){return x.id===id;}); if(!inv) return;
  _draft=Object.assign({},inv,{_editingId:id});
  closeModal();
  go('#/sales/new');
}

function totalsCalc(){
  if(!_draft) return {sub:0,tax:0,disc:0,total:0};
  const sub=_draft.lines.reduce((s,l)=>s+l.qty*l.price,0);
  var taxEnabled=_draft.taxEnabled!==false;
  var taxOv=(_draft.taxRateOverride!=null&&_draft.taxRateOverride!=='')?Number(_draft.taxRateOverride):null;
  const tax=taxEnabled?_draft.lines.reduce((s,l)=>s+l.qty*l.price*(taxOv!=null?taxOv:l.tax)/100,0):0;
  const disc=Number(_draft.discount||0);
  const total=Math.round(sub+tax-disc);
  return {sub,tax,disc,total};
}
function renderTotals(){
  const t=totalsCalc();
  const due=Math.max(0,t.total-Number(_draft?.paid||0));
  return `<div class="text-sm font-semibold mb-3">Summary</div>
    <div class="space-y-2 text-sm">
      <div class="flex justify-between"><span class="text-stone-500">Subtotal</span><span class="num">${fmt(t.sub)}</span></div>
      <div class="flex justify-between"><span class="text-stone-500">Tax</span><span class="num">${fmt(t.tax)}</span></div>
      <div class="flex justify-between items-center"><span class="text-stone-500">Discount</span>
        <input value="${_draft?.discount||0}" oninput="_draft.discount=Number(this.value||0); renderTotalsPanel()" type="number" class="num text-right w-24 px-2 py-1 text-xs rounded-md border border-stone-200 dark:border-stone-800 bg-stone-50 dark:bg-stone-900 outline-none" />

      <div class="flex justify-between text-xs ${due>0?'text-amber-600':'text-emerald-600'}"><span>${due>0?'Due':'Settled'}</span><span class="num font-semibold">${fmt(due)}</span></div>

}
function renderTotalsPanel(){ const el=document.getElementById('totals'); if(el) el.innerHTML = renderTotals(); }

function renderProdGrid_inner(filter){
  const q=(filter||'').toLowerCase().trim();
  const list = q ? state.products.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)) : state.products;
  if(!list.length) return '<div class="col-span-full text-center py-8 text-stone-500 text-sm">No products match</div>';
  return list.map(p=>{
    const out = p.stock<=0;
    const low = p.stock>0 && p.stock<=p.reorder;

function addLine(pid){
  const p=findProd(pid); if(!p) return;
  if(p.stock<=0){ toast('Out of stock','err'); return; }
  if(!_draft) _draft=newDraft();
  const ex=_draft.lines.find(l=>l.pid===pid);
  if(ex){ ex.qty+=1; toast(`${p.name} × ${ex.qty}`); }
  else { _draft.lines.push({pid,sku:p.sku,name:p.name,qty:1,price:p.price,cost:p.cost,tax:p.tax,disc:0}); toast(`Added ${p.name}`); }
  rerenderCart();
}
function adjQty(idx, delta){

function setQty(idx, val){

function removeLine(idx){

function markFullyPaid(){

/* ---------- Barcode scanning (hardware + camera) ---------- */
function handleBarcodeKey(e){
  if(e.key !== 'Enter') return;
  e.preventDefault();
  const q = (e.target.value||'').trim();
  if(!q) return;
  // Exact SKU match (typical for hardware barcode scanners)
  let p = state.products.find(p=>p.sku.toLowerCase()===q.toLowerCase());
  // Then partial name/SKU match
  if(!p) p = state.products.find(p=>p.sku.toLowerCase().includes(q.toLowerCase()) || p.name.toLowerCase().includes(q.toLowerCase()));
  if(!p){ toast(`No product matches "${q}"`,'err'); return; }
  e.target.value='';
  addLine(p.id);
  renderProdGrid();
}

let _scanStream=null, _scanLoop=null;
async function startBarcodeScan(){
  try{
    if(!('BarcodeDetector' in window)){
      toast('Camera scan needs Chrome on Android. Tip: a USB barcode scanner works in the search box.','info');
      document.getElementById('prodSearch')?.focus();
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    _scanStream = stream;
    showModal(`<div class="p-4 w-[420px] max-w-full">
      <div class="flex items-center justify-between mb-3">
        <div class="font-semibold flex items-center gap-2"><i data-lucide="scan-line" class="w-4 h-4 text-brand-600"></i> Scan barcode</div>
        <button onclick="stopBarcodeScan(); closeModal()" class="p-1.5 rounded-lg hover:bg-stone-100 dark:hover:bg-stone-900"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div id="scanWrap" class="aspect-video bg-black rounded-xl overflow-hidden relative">
        <video id="scanVideo" playsinline autoplay muted style="width:100%;height:100%;object-fit:cover;"></video>
        <div class="absolute inset-x-6 top-1/2 h-0.5 bg-rose-500/80 shadow-[0_0_8px_rgba(244,63,94,0.7)] -translate-y-1/2 pointer-events-none"></div>
      </div>
      <div id="scanStatus" class="text-xs text-stone-500 mt-2 text-center">Point the back camera at a product barcode</div>
    </div>`);
    const video = document.getElementById('scanVideo');
    video.srcObject = stream;
    await video.play().catch(()=>{});
    const detector = new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e','code_39','code_93','itf','codabar','qr_code']});
    let stopped=false;
    _scanLoop = async ()=>{
      if(stopped || !_scanStream) return;
      try{
        const codes = await detector.detect(video);
        if(codes && codes.length){
          const code = codes[0].rawValue;
          const p = state.products.find(p=>p.sku.toLowerCase()===code.toLowerCase());
          if(p){
            stopped=true;
            stopBarcodeScan();
            closeModal();
            addLine(p.id);
            return;
          } else {
            const st=document.getElementById('scanStatus'); if(st) st.textContent='Read: '+code+' — no SKU matches. Keep scanning…';
          }
        }
      }catch(err){ console.warn('detect',err); }
      requestAnimationFrame(_scanLoop);
    };
    requestAnimationFrame(_scanLoop);
  }catch(err){
    console.error(err);
    toast('Camera blocked: '+(err.message||'permission denied'),'err');
    stopBarcodeScan();
  }
}
function stopBarcodeScan(){
  try{ _scanStream?.getTracks().forEach(t=>t.stop()); }catch(_){}
  _scanStream=null; _scanLoop=null;
}
function cancelDraft(){ _draft=null; go(isTeam()?'#/team-pos':'#/sales'); }
function saveDraft(mode){
  if(!_draft.lines.length) return toast('Add at least one item','err');
  const t=totalsCalc();
  _draft.subtotal=t.sub; _draft.tax=t.tax; _draft.total=t.total;
  _draft.status = _draft.paid>=_draft.total ? 'paid' : 'unpaid';
  if(!_draft.createdBy) _draft.createdBy=currentUser()||'Founder';
  var editingId=_draft._editingId||null;
  if(editingId){
    var old=state.invoices.find(function(x){return x.id===editingId;});
    if(old) old.lines.forEach(function(l){var p=findProd(l.pid);if(p)p.stock+=l.qty;});
    _draft.lines.forEach(function(l){var p=findProd(l.pid);if(p)p.stock=Math.max(0,p.stock-l.qty);});
    delete _draft._editingId;
    var idx=state.invoices.findIndex(function(x){return x.id===editingId;});
    if(idx>=0) state.invoices[idx]=Object.assign({},_draft); else state.invoices.push(Object.assign({},_draft));
    state.audit.push({ts:Date.now(),action:'invoice.edit',ref:_draft.number,by:currentUser()||'Founder'});
  } else {
    // adjust stock
    _draft.lines.forEach(function(l){var p=findProd(l.pid);if(p)p.stock=Math.max(0,p.stock-l.qty);});
    state.invoices.push(Object.assign({},_draft));
    state.audit.push({ts:Date.now(),action:'invoice.create',ref:_draft.number,by:_draft.createdBy});
  }
  save(); const id=_draft.id; _draft=null; toast('Bill saved ✓');
  // Navigate to bills list, then open the bill modal with full action buttons
  go(isTeam()?'#/team-bills':'#/sales');
  setTimeout(()=>{
    openInvoiceView(id);
    // Auto-trigger the requested action so the user gets what they clicked
    if(mode==='print') setTimeout(()=>printInvoice(id), 250);
    else if(mode==='whatsapp') setTimeout(()=>shareWhatsApp(id), 250);
  }, 120);
}

      </div>
      <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-stone-100 dark:hover:bg-stone-900"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>

function printInvoice(id){
  const i=state.invoices.find(x=>x.id===id); if(!i){ toast('Bill not found','err'); return; }
  const area=document.getElementById('print-area');
  area.innerHTML=buildReceiptHTML(i);
  // Use afterprint event for cleanup so content stays put until printing completes
  const cleanup=()=>{ area.innerHTML=''; window.removeEventListener('afterprint', cleanup); };
  window.addEventListener('afterprint', cleanup);
  // Slight delay so the DOM settles before triggering the print dialog
  setTimeout(()=>{ try{ window.print(); }catch(e){ console.error(e); toast('Print failed: '+e.message,'err'); area.innerHTML=''; } }, 120);
}
function buildReceiptText(i){
  const c=findCust(i.customerId);
  const lines = i.lines.map(l=>{
    const total = l.qty*l.price*(1+l.tax/100);
    return `• ${l.name} × ${l.qty} — ${fmt(total)}`;
  }).join('\n');
  const due = i.total - i.paid;
  return [
    `*${state.org.name}*`,
    state.org.address,
    state.org.phone + (state.org.email?' · '+state.org.email:''),
    state.org.gstin?'GSTIN: '+state.org.gstin:'',
    '',
    '────────────',
    `*${i.status==='paid'?'TAX RECEIPT':'INVOICE'} ${i.number}*`,
    `Date: ${dateNice(i.date)}`,
    `Bill to: ${c?.name||'Walk-in customer'} (${i.customerType||'Walk-in'})`,
    '',
    '*Items:*',
    lines,
    '',
    `Subtotal: ${fmt(i.subtotal)}`,
    `Tax: ${fmt(i.tax)}`,
    i.discount?`Discount: -${fmt(i.discount)}`:'',
    `*TOTAL: ${fmt(i.total)}*`,
    `Paid (${i.payment}): ${fmt(i.paid)}`,
    due>0?`Balance due: ${fmt(due)}`:'',
    '',
    state.org.footer||''
  ].filter(Boolean).join('\n');
}
function _waOpen(phone, text){
  const url = phone
    ? `https://wa.me/${phone}?text=${encodeURIComponent(text)}`
    : `https://wa.me/?text=${encodeURIComponent(text)}`;
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
  document.body.appendChild(a); a.click(); a.remove();
  try{ navigator.clipboard?.writeText(text); }catch(_){}
}
function shareWhatsApp(id){
  const i=state.invoices.find(x=>x.id===id); if(!i){ toast('Bill not found','err'); return; }
  const c=findCust(i.customerId);
  const text=buildReceiptText(i);
  // Priority: phone entered on the bill > customer's saved phone > prompt
  const billPhone = (i.phoneOverride||'').replace(/[^0-9]/g,'');
  const custPhone = (c?.phone||'').replace(/[^0-9]/g,'');
  const phone = billPhone || custPhone;
  if(phone){
    _waOpen(phone, text);
    toast(`Opening WhatsApp · ${c?.name||'+'+phone}`);
    return;
  }
  // Stash text in a global so the prompt buttons can use it cleanly
  window._pendingShare={text, billId:id};
  showModal(`<div class="p-5 w-[420px] max-w-full">
    <div class="flex items-center justify-between mb-3">
      <div class="font-semibold flex items-center gap-2"><i data-lucide="message-circle" class="w-4 h-4 text-emerald-600"></i> Send bill on WhatsApp</div>
      <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-stone-100 dark:hover:bg-stone-900"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="text-sm text-stone-500 mb-3">No phone saved for this customer. Enter one to send directly, or pick from WhatsApp.</div>
    <input id="waPhonePrompt" type="tel" inputmode="tel" placeholder="+91 98765 43210" class="w-full px-3 py-2.5 text-base rounded-lg border border-stone-200 dark:border-stone-800 bg-stone-50 dark:bg-stone-900 outline-none num focus:border-brand-400" autofocus />
    <div class="flex gap-2 mt-3">
      <button onclick="_doSharePick()" class="flex-1 px-3 py-2.5 rounded-lg border border-stone-200 dark:border-stone-800 text-sm">Pick contact</button>
      <button onclick="_doShareWithPhone()" class="flex-1 px-3 py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium">Send to phone</button>
    </div>
  </div>`);
  setTimeout(()=>document.getElementById('waPhonePrompt')?.focus(),50);
}
function _doSharePick(){
  const t=window._pendingShare?.text||''; closeModal(); _waOpen('', t); toast('Opening WhatsApp — choose recipient');
}
function _doShareWithPhone(){
  const t=window._pendingShare?.text||'';
  const p=(document.getElementById('waPhonePrompt')?.value||'').replace(/[^0-9]/g,'');
  if(!p){ toast('Enter phone','err'); return; }
  // Also save the phone to the customer for next time
  const i=state.invoices.find(x=>x.id===window._pendingShare?.billId);
  if(i){
    const c=findCust(i.customerId);
    if(c && !c.phone){ c.phone='+'+p; save(); }
    if(i){ i.phoneOverride='+'+p; save(); }
  }
  closeModal(); _waOpen(p, t); toast('Opening WhatsApp · +'+p);
}
function copyReceiptText(id){
  const i=state.invoices.find(x=>x.id===id); if(!i) return;
  navigator.clipboard.writeText(buildReceiptText(i)).then(()=>toast('Receipt copied to clipboard'));
}
function downloadInvoiceHTML(id){
  const i=state.invoices.find(x=>x.id===id); if(!i) return;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${i.number}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet"></head><body style="margin:0;padding:32px;background:#fafaf9;">${buildReceiptHTML(i)}</body></html>`;
  const blob=new Blob([html],{type:'text/html'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=i.number+'.html'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Receipt downloaded');
}

function savePurchase(id){
  const pid=document.getElementById('pbprod').value;
  const p=findProd(pid);
  const qty=Number(document.getElementById('pbqty').value||0);
  const cost=Number(document.getElementById('pbcost').value||0);
  const tax=Number(document.getElementById('pbtax').value||0);
  const paid=Number(document.getElementById('pbpaid').value||0);
  const sub=qty*cost; const taxA=sub*tax/100; const total=Math.round(sub+taxA);
  if(id){
    const existing=state.purchases.find(x=>x.id===id);
    if(!existing){ toast('Bill not found','err'); return; }
    // reverse old stock effect
    const oldLine=existing.lines?.[0];
    if(oldLine){
      const oldProd=findProd(oldLine.pid);
      if(oldProd) oldProd.stock-=oldLine.qty;
    }
    existing.number=document.getElementById('pbnum').value;
    existing.date=document.getElementById('pbdate').value;
    existing.supplierId=document.getElementById('pbsupp').value;
    existing.lines=[{pid,sku:p.sku,name:p.name,qty,price:cost,tax}];
    existing.subtotal=sub; existing.tax=taxA; existing.total=total;
    existing.paid=paid; existing.status=paid>=total?'paid':'unpaid';
    if(p){ p.stock+=qty; p.cost=cost||p.cost; }
    save(); closeModal(); toast('Purchase updated'); router();
    return;
  }
  const b={id:uid('po_'),number:document.getElementById('pbnum').value,date:document.getElementById('pbdate').value,supplierId:document.getElementById('pbsupp').value,lines:[{pid,sku:p.sku,name:p.name,qty,price:cost,tax}],subtotal:sub,tax:taxA,total,paid,status:paid>=total?'paid':'unpaid'};
  state.purchases.push(b);
  if(p){ p.stock+=qty; p.cost=cost||p.cost; }
  save(); closeModal(); toast('Purchase saved'); router();
}
function deletePurchase(id){
  const b=state.purchases.find(x=>x.id===id); if(!b){ toast('Bill not found','err'); return; }
  if(!confirm(`Delete ${b.number}? This will reverse the stock added by this bill.`)) return;
  (b.lines||[]).forEach(l=>{ const p=findProd(l.pid); if(p) p.stock-=l.qty; });
  state.purchases=state.purchases.filter(x=>x.id!==id);
  save(); toast('Purchase deleted'); router();
}

  </div>`;

function drawPLChart(){
  const sales=state.invoices.reduce((s,i)=>s+i.subtotal,0);
  const cogs=state.invoices.reduce((s,i)=>s+i.lines.reduce((x,l)=>x+l.qty*l.cost,0),0);
  const opex=state.expenses.reduce((s,e)=>s+e.amount,0);
  const ctx=document.getElementById('plChart'); if(!ctx) return;
  new Chart(ctx,{type:'bar',data:{labels:['Revenue','COGS','OpEx','Net'],datasets:[{data:[sales,cogs,opex,sales-cogs-opex],backgroundColor:['#0ea5e9','#a8a29e','#f43f5e','#10b981'],borderRadius:8}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>SYM()+(v/1000).toFixed(0)+'k'}}},maintainAspectRatio:false}});
}
function drawDailyChart(){
  const arr=[]; for(let d=29;d>=0;d--){const day=new Date(); day.setDate(day.getDate()-d); const k=day.toISOString().slice(0,10); arr.push({k,v:state.invoices.filter(i=>i.date===k).reduce((s,i)=>s+i.total,0)});}
  const ctx=document.getElementById('dailyChart'); if(!ctx) return;
  new Chart(ctx,{type:'bar',data:{labels:arr.map(a=>a.k.slice(8,10)),datasets:[{data:arr.map(a=>a.v),backgroundColor:'#6366f1',borderRadius:4}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>SYM()+(v/1000).toFixed(0)+'k'}}},maintainAspectRatio:false}});
}
function exportLowStockCSV(){
  const rows=[['Product','SKU','Stock','Reorder']].concat(lowStock().map(p=>[p.name,p.sku,p.stock,p.reorder]));
  const csv=rows.map(r=>r.map(x=>`"${x}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='low-stock.csv'; a.click();
  toast('CSV downloaded');
}

        <div class="bg-white dark:bg-[#141416] border border-stone-200 dark:border-stone-800 rounded-2xl p-5 shadow-soft">
          <div class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-emerald-600"></i> Team members</div>
          <div class="space-y-2 text-sm">
            ${state.team.map(m=>`<div class="flex items-center gap-2 p-2 rounded-lg bg-stone-50 dark:bg-stone-900">
              <div class="w-7 h-7 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 text-white flex items-center justify-center text-xs font-semibold">${m.name[0].toUpperCase()}</div>
              <div class="flex-1 truncate">${m.name}</div>
              <button onclick="removeTeam('${m.id}')" class="p-1.5 rounded-md hover:bg-rose-50 dark:hover:bg-rose-900/20 text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>`).join('') || '<div class="text-xs text-stone-500 p-2">No team members yet.</div>'}
            <div class="flex gap-2 pt-1">
              <input id="newTeam" placeholder="New team member name" class="flex-1 px-3 py-2 rounded-lg border border-stone-200 dark:border-stone-800 bg-stone-50 dark:bg-stone-900 outline-none focus:border-brand-400 text-sm" />
              <button onclick="addTeam()" class="px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium flex items-center gap-1.5"><i data-lucide="user-plus" class="w-4 h-4"></i> Add</button>
            </div>
            <div class="text-[11px] text-stone-500">Team members log in by tapping their name — no password needed. They can only create bills and view inventory.</div>
          </div>
        </div>

        <div class="bg-white dark:bg-[#141416] border border-stone-200 dark:border-stone-800 rounded-2xl p-5 shadow-soft">
          <div class="text-sm font-semibold mb-3">Data & backup</div>
          <div class="space-y-2">
            <button onclick="exportData()" class="w-full px-3 py-2 rounded-lg border border-stone-200 dark:border-stone-800 text-sm flex items-center gap-2 hover:bg-stone-50 dark:hover:bg-stone-900"><i data-lucide="download" class="w-4 h-4"></i> Backup all data (JSON)</button>
            <button onclick="importData()" class="w-full px-3 py-2 rounded-lg border border-stone-200 dark:border-stone-800 text-sm flex items-center gap-2 hover:bg-stone-50 dark:hover:bg-stone-900"><i data-lucide="upload" class="w-4 h-4"></i> Restore from backup</button>
            <button onclick="resetSeed()" class="w-full px-3 py-2 rounded-lg border border-rose-200 dark:border-rose-900 text-rose-600 text-sm flex items-center gap-2 hover:bg-rose-50 dark:hover:bg-rose-900/20"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset to demo data</button>
          </div>
        </div>

        <div class="bg-white dark:bg-[#141416] border border-stone-200 dark:border-stone-800 rounded-2xl p-5 shadow-soft">
          <div class="text-sm font-semibold mb-3">About BizOS</div>
          <p class="text-xs text-stone-500 leading-relaxed">BizOS runs entirely in your browser. All your data stays on this device — no servers, no signups, no subscriptions. Backup regularly. ⌘K to search anywhere. Press <span class="kbd">N</span> for new bill.</p>
        </div>
      </div>
    </div>
  </div>`;
}
async function doChangePwd(){
  const o=document.getElementById('oldPwd').value, n=document.getElementById('newPwd').value;
  if(!o||!n||n.length<4) return toast('Need old + new password (4+ chars)','err');
  await changeFounderPwd(o,n);
  document.getElementById('oldPwd').value=''; document.getElementById('newPwd').value='';
}
function addTeam(){
  const n=document.getElementById('newTeam').value.trim(); if(!n) return;
  state.team.push({id:uid('u_'),name:n}); save(); toast('Team member added'); router();
}
function removeTeam(id){
  if(!confirm('Remove this team member?')) return;
  state.team=state.team.filter(t=>t.id!==id); save(); router();
}
function saveOrg(){
  state.org.name=document.getElementById('oname').value; state.org.address=document.getElementById('oaddr').value; state.org.phone=document.getElementById('ophone').value; state.org.email=document.getElementById('oemail').value; state.org.gstin=document.getElementById('ogstin').value; state.org.footer=document.getElementById('ofooter').value; state.org.symbol=document.getElementById('osym').value; state.org.taxLabel=document.getElementById('otax').value;
  save(); toast('Saved');
}
function exportData(){
  const a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(state,null,2)); a.download='bizos-backup-'+todayISO()+'.json'; a.click(); toast('Backup downloaded');
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ state=JSON.parse(r.result); save(); toast('Restored'); router(); }catch(err){ toast('Invalid file','err'); } }; r.readAsText(f); };
  inp.click();
}
function resetSeed(){ if(!confirm('Reset all data to demo? This will erase your changes.')) return; state=seed(); save(); toast('Reset to demo'); router(); }

/* ---------- Modal ---------- */
function showModal(html){
  document.getElementById('modalMount').innerHTML=`<div class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 fade-in" onclick="if(event.target===this) closeModal()"><div class="bg-white dark:bg-[#141416] rounded-2xl shadow-pop border border-stone-200 dark:border-stone-800 max-h-[90vh] overflow-y-auto scroll-thin pop-in">${html}</div></div>`;
  lucide.createIcons();
}
function closeModal(){ document.getElementById('modalMount').innerHTML=''; }

/* ---------- Command Palette ---------- */
function openCmdK(){ document.getElementById('cmdK').classList.remove('hidden'); document.getElementById('cmdKInput').value=''; renderCmdK(); setTimeout(()=>document.getElementById('cmdKInput').focus(),50); }
function closeCmdK(){ document.getElementById('cmdK').classList.add('hidden'); }
function renderCmdK(){
  const q=(document.getElementById('cmdKInput').value||'').toLowerCase().trim();
  const actions=[
    {l:'Go to Dashboard',i:'layout-dashboard',fn:()=>{ go('#/dashboard'); closeCmdK(); }},
    {l:'New Invoice',i:'plus-square',fn:()=>{ go('#/sales/new'); closeCmdK(); }},
    {l:'Add Product',i:'package-plus',fn:()=>{ go('#/inventory'); closeCmdK(); setTimeout(openProductModal,150); }},
    {l:'Add Customer',i:'user-plus',fn:()=>{ go('#/customers'); closeCmdK(); setTimeout(openCustomerModal,150); }},
    {l:'Add Expense',i:'banknote',fn:()=>{ go('#/expenses'); closeCmdK(); setTimeout(openExpenseModal,150); }},
    {l:'Open Reports',i:'bar-chart-3',fn:()=>{ go('#/reports'); closeCmdK(); }},
    {l:'Open Settings',i:'settings',fn:()=>{ go('#/settings'); closeCmdK(); }},
    {l:'Toggle dark mode',i:'moon-star',fn:()=>{ toggleDark(); closeCmdK(); }}
  ].filter(a=>!q || a.l.toLowerCase().includes(q));
  const prods=q ? state.products.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)).slice(0,4) : [];
  const custs=q ? state.customers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,4) : [];
  const invs=q ? state.invoices.filter(i=>i.number.toLowerCase().includes(q)).slice(0,4) : [];
  const sec=(t,arr,html)=> arr.length?`<div class="px-2 pt-2 pb-1 text-[11px] uppercase tracking-wider text-stone-500">${t}</div>${arr.map(html).join('')}`:'';
  document.getElementById('cmdKResults').innerHTML =
    sec('Actions',actions,(a,idx)=>`<button onclick='(${a.fn.toString()})()' class="w-full text-left px-3 py-2 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-900 flex items-center gap-2"><i data-lucide="${a.i}" class="w-4 h-4 text-stone-500"></i>${a.l}</button>`)+
    sec('Products',prods,p=>`<button onclick="closeCmdK(); go('#/inventory')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-900 flex items-center gap-2"><i data-lucide="package" class="w-4 h-4 text-stone-500"></i>${p.name}<span class="ml-auto text-xs text-stone-500 num">${p.sku}</span></button>`)+
    sec('Customers',custs,c=>`<button onclick="closeCmdK(); go('#/customers')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-900 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-stone-500"></i>${c.name}</button>`)+
    sec('Invoices',invs,i=>`<button onclick="closeCmdK(); openInvoiceView('${i.id}')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-900 flex items-center gap-2"><i data-lucide="receipt" class="w-4 h-4 text-stone-500"></i>${i.number}<span class="ml-auto text-xs text-stone-500 num">${fmt(i.total)}</span></button>`);
  lucide.createIcons();
}

/* ---------- Co-Pilot ---------- */
function appendCopilot(role,html){
  const c=document.getElementById('copilotChat');
  const div=document.createElement('div');
  div.className=role==='me' ? 'flex justify-end' : 'flex';
  div.innerHTML = role==='me'
    ? `<div class="max-w-[80%] px-3 py-2 rounded-2xl rounded-tr-sm bg-brand-600 text-white text-sm">${html}</div>`
    : `<div class="max-w-[85%] px-3 py-2 rounded-2xl rounded-tl-sm bg-stone-100 dark:bg-stone-900 text-sm">${html}</div>`;
  c.appendChild(div); c.scrollTop=c.scrollHeight; lucide.createIcons();
}
function askCopilot(q){
  appendCopilot('me', q);
  const a=answerCopilot(q.toLowerCase());
  setTimeout(()=>appendCopilot('ai',a),300);
}
function answerCopilot(q){
  if(q.includes('hi')||q.includes('hello')||q.includes('what can you')){
    return `I can answer questions about your business in real time. Try:<br>• <em>"Total sales today"</em><br>• <em>"Best selling item"</em><br>• <em>"Who owes me money?"</em><br>• <em>"Low stock items"</em><br>• <em>"Profit this month"</em>`;
  }
  if(q.includes('today') && (q.includes('sale')||q.includes('sales'))){
    const t=todaySales(); const c=state.invoices.filter(i=>i.date===todayISO()).length;
    return `Today's sales: <b class="num">${fmt(t)}</b> across <b>${c}</b> invoice${c===1?'':'s'}.`;
  }
  if(q.includes('best') || q.includes('top')){
    const m={}; state.invoices.forEach(i=>i.lines.forEach(l=>{ m[l.pid]=(m[l.pid]||0)+l.qty*l.price; }));
    const top=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];
    if(!top) return 'No sales yet.';
    return `Best seller is <b>${findProd(top[0])?.name||'—'}</b> with <b class="num">${fmt(top[1])}</b> in revenue.`;
  }
  if(q.includes('low stock')||q.includes('out of stock')||q.includes('reorder')){
    const ls=lowStock();
    if(!ls.length) return 'All stock levels look healthy ✨';
    return `<b>${ls.length}</b> products are low on stock:<br>` + ls.slice(0,5).map(p=>`• ${p.name} — only ${p.stock} ${p.unit}`).join('<br>') + (ls.length>5?`<br>…and ${ls.length-5} more`:'');
  }
  if(q.includes('owe')||q.includes('receivable')||q.includes('outstanding')){
    const u=state.invoices.filter(i=>i.status==='unpaid');
    if(!u.length) return 'No outstanding invoices 🎉';
    return `<b>${fmt(sumDue())}</b> across <b>${u.length}</b> unpaid invoices:<br>` + u.slice(0,5).map(i=>`• ${findCust(i.customerId)?.name||'—'} — ${fmt(i.total-i.paid)}`).join('<br>');
  }
  if(q.includes('profit')||q.includes('margin')){
    const sales=state.invoices.reduce((s,i)=>s+i.subtotal,0);
    const cogs=state.invoices.reduce((s,i)=>s+i.lines.reduce((x,l)=>x+l.qty*l.cost,0),0);
    const opex=state.expenses.reduce((s,e)=>s+e.amount,0);
    return `Net profit: <b class="num">${fmt(sales-cogs-opex)}</b> (Revenue ${fmt(sales)} − COGS ${fmt(cogs)} − OpEx ${fmt(opex)}).`;
  }
  if(q.includes('cash')||q.includes('bank')||q.includes('balance')){
    return `Estimated cash + bank position: <b class="num">${fmt(cashIn())}</b>.`;
  }
  if(q.includes('customer') && (q.includes('how many')||q.includes('count'))){
    return `You have <b>${state.customers.length}</b> customers.`;
  }
  if(q.includes('product') && (q.includes('how many')||q.includes('count'))){
    return `You stock <b>${state.products.length}</b> products with total inventory value of <b class="num">${fmt(state.products.reduce((s,p)=>s+p.stock*p.cost,0))}</b>.`;
  }
  return `I can pull this from your data, but I'm not sure I understood. Try asking about <em>sales today</em>, <em>profit</em>, <em>low stock</em>, <em>who owes me money</em>, or <em>best selling item</em>.`;
}

/* ---------- Keyboard ---------- */
window.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey) && e.key==='k'){ e.preventDefault(); openCmdK(); }
  if(e.key==='Escape'){ closeCmdK(); closeModal(); }
  if(!e.metaKey && !e.ctrlKey && !e.altKey && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA' && document.activeElement.tagName!=='SELECT'){
    if(e.key==='n') go('#/sales/new');
    if(e.key==='?') toast('Shortcuts: ⌘K search · N new invoice · Esc close','info');
  }
});

/* ---------- Boot ---------- */
router();
lucide.createIcons();
tickClock();
setInterval(tickClock, 1000);
</script>
